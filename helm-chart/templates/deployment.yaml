apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "4ga-boards.fullname" . }}
  labels:
    {{- include "4ga-boards.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "4ga-boards.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "4ga-boards.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "4ga-boards.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
          - name: BASE_URL
            value: {{ .Values.env.required.BASE_URL }}
          - name: SECRET_KEY
            value: {{ .Values.env.required.SECRET_KEY }}
          - name: CLIENT_URL
            value: {{ .Values.env.optional.CLIENT_URL }}
          - name: INSTANCE_NAME
            value: {{ .Values.env.optional.INSTANCE_NAME }}
          - name: DEFAULT_ADMIN_USERNAME
            value: {{ .Values.env.optional.DEFAULT_ADMIN_USERNAME }}
          - name: DEFAULT_ADMIN_EMAIL
            value: {{ .Values.env.optional.DEFAULT_ADMIN_EMAIL }}
          - name: DEFAULT_ADMIN_NAME
            value: {{ .Values.env.optional.DEFAULT_ADMIN_NAME }}
          - name: DEFAULT_ADMIN_PASSWORD
            value: {{ .Values.env.optional.DEFAULT_ADMIN_PASSWORD }}
          - name: DEFAULT_PROJECT_CREATION_ALL
            value: {{ .Values.env.optional.DEFAULT_PROJECT_CREATION_ALL }}
          - name: DEFAULT_REGISTRATION_ENABLED
            value: {{ .Values.env.optional.DEFAULT_REGISTRATION_ENABLED }}
          - name: DEFAULT_LOCAL_REGISTRATION_ENABLED
            value: {{ .Values.env.optional.DEFAULT_LOCAL_REGISTRATION_ENABLED }}
          - name: DEFAULT_SSO_REGISTRATION_ENABLED
            value: {{ .Values.env.optional.DEFAULT_SSO_REGISTRATION_ENABLED }}
          - name: GOOGLE_CLIENT_ID
            value: {{ .Values.env.optional.GOOGLE_CLIENT_ID }}
          - name: GOOGLE_CLIENT_SECRET
            value: {{ .Values.env.optional.GOOGLE_CLIENT_SECRET }}
          - name: GITHUB_CLIENT_ID
            value: {{ .Values.env.optional.GITHUB_CLIENT_ID }}
          - name: GITHUB_CLIENT_SECRET
            value: {{ .Values.env.optional.GITHUB_CLIENT_SECRET }}
          - name: MICROSOFT_CLIENT_ID
            value: {{ .Values.env.optional.MICROSOFT_CLIENT_ID }}
          - name: MICROSOFT_CLIENT_SECRET
            value: {{ .Values.env.optional.MICROSOFT_CLIENT_SECRET }}
          - name: OIDC_CLIENT_ID
            value: {{ .Values.env.optional.OIDC_CLIENT_ID }}
          - name: OIDC_CLIENT_SECRET
            value: {{ .Values.env.optional.OIDC_CLIENT_SECRET }}
          - name: OIDC_AUTH_URL
            value: {{ .Values.env.optional.OIDC_AUTH_URL }}
          - name: OIDC_TOKEN_URL
            value: {{ .Values.env.optional.OIDC_TOKEN_URL }}
          - name: OIDC_USERINFO_URL
            value: {{ .Values.env.optional.OIDC_USERINFO_URL }}
          - name: OIDC_ISSUER_URL
            value: {{ .Values.env.optional.OIDC_ISSUER_URL }}
          - name: OIDC_STATE_SECRET
            value: {{ .Values.env.optional.OIDC_STATE_SECRET }}
          - name: OIDC_ENABLED_METHODS
            value: {{ .Values.env.optional.OIDC_ENABLED_METHODS }}
          - name: OIDC_SKIP_ACCOUNT_SELECTION
            value: {{ .Values.env.optional.OIDC_SKIP_ACCOUNT_SELECTION }}
          - name: OIDC_SKIP_ACCOUNT_SELECTION_HINT_GOOGLE
            value: {{ .Values.env.optional.OIDC_SKIP_ACCOUNT_SELECTION_HINT_GOOGLE }}
          - name: OIDC_SKIP_ACCOUNT_SELECTION_HINT_MICROSOFT
            value: {{ .Values.env.optional.OIDC_SKIP_ACCOUNT_SELECTION_HINT_MICROSOFT }}
          - name: OIDC_SKIP_ACCOUNT_SELECTION_HINT_GITHUB
            value: {{ .Values.env.optional.OIDC_SKIP_ACCOUNT_SELECTION_HINT_GITHUB }}
          - name: OIDC_DISABLE_HINT_GOOGLE
            value: {{ .Values.env.optional.OIDC_DISABLE_HINT_GOOGLE }}
          - name: OIDC_DISABLE_HINT_MICROSOFT
            value: {{ .Values.env.optional.OIDC_DISABLE_HINT_MICROSOFT }}
          - name: OIDC_DISABLE_HINT_GITHUB
            value: {{ .Values.env.optional.OIDC_DISABLE_HINT_GITHUB }}
          - name: MAIL_SERVICE_INBOUND_EMAIL
            value: {{ .Values.env.optional.MAIL_SERVICE_INBOUND_EMAIL }}
          - name: NOTIFICATIONS_HOST_URL
            value: {{ .Values.env.optional.NOTIFICATIONS_HOST_URL }}
          - name: DEMO_MODE
            value: {{ .Values.env.optional.DEMO_MODE }}
          - name: METRICS_ENABLED
            value: {{ .Values.env.optional.METRICS_ENABLED }}
          - name: HYPERDX_ENABLED
            value: {{ .Values.env.optional.HYPERDX_ENABLED }}
          - name: HYPERDX_API_KEY
            value: {{ .Values.env.optional.HYPERDX_API_KEY }}
          - name: HYPERDX_INSTANCE_NAME
            value: {{ .Values.env.optional.HYPERDX_INSTANCE_NAME }}
          - name: HYPERDX_TRACE_PROPAGATION_TARGETS
            value: {{ .Values.env.optional.HYPERDX_TRACE_PROPAGATION_TARGETS }}
          - name: OTEL_URL
            value: {{ .Values.env.optional.OTEL_URL }}
          - name: OTEL_URL_FORMAT
            value: {{ .Values.env.optional.OTEL_URL_FORMAT }}
          - name: LOG_LEVEL
            value: {{ .Values.env.optional.LOG_LEVEL }}
          - name: TRUST_PROXY
            value: {{ .Values.env.optional.TRUST_PROXY }}
          - name: TOKEN_EXPIRES_IN
            value: {{ .Values.env.optional.TOKEN_EXPIRES_IN }}
          - name: AUTH_RATE_LIMIT_ENABLED
            value: {{ .Values.env.optional.AUTH_RATE_LIMIT_ENABLED }}
          - name: AUTH_RATE_LIMIT_MAX_ATTEMPTS
            value: {{ .Values.env.optional.AUTH_RATE_LIMIT_MAX_ATTEMPTS }}
          - name: AUTH_RATE_LIMIT_WINDOW_MS
            value: {{ .Values.env.optional.AUTH_RATE_LIMIT_WINDOW_MS }}
          - name: UPLOAD_RATE_LIMIT_ENABLED
            value: {{ .Values.env.optional.UPLOAD_RATE_LIMIT_ENABLED }}
          - name: UPLOAD_RATE_LIMIT_MAX_ATTEMPTS
            value: {{ .Values.env.optional.UPLOAD_RATE_LIMIT_MAX_ATTEMPTS }}
          - name: UPLOAD_RATE_LIMIT_WINDOW_MS
            value: {{ .Values.env.optional.UPLOAD_RATE_LIMIT_WINDOW_MS }}
          - name: UPLOAD_RATE_LIMIT_STORE
            {{- if .Values.env.optional.UPLOAD_RATE_LIMIT_STORE }}
            value: {{ .Values.env.optional.UPLOAD_RATE_LIMIT_STORE }}
            {{- else if .Values.redis.enabled }}
            value: redis
            {{- else }}
            value: memory
            {{- end }}
          - name: UPLOAD_RATE_LIMIT_REDIS_URL
            {{- if .Values.env.optional.UPLOAD_RATE_LIMIT_REDIS_URL }}
            value: {{ .Values.env.optional.UPLOAD_RATE_LIMIT_REDIS_URL }}
            {{- else if .Values.redis.enabled }}
            value: "redis://{{ .Release.Name }}-redis-master:6379/0"
            {{- else }}
            value: ""
            {{- end }}
          - name: UPLOAD_RATE_LIMIT_REDIS_CONNECT_TIMEOUT_MS
            value: {{ .Values.env.optional.UPLOAD_RATE_LIMIT_REDIS_CONNECT_TIMEOUT_MS }}
          - name: UPLOAD_RATE_LIMIT_KEY_PREFIX
            value: {{ .Values.env.optional.UPLOAD_RATE_LIMIT_KEY_PREFIX }}
          - name: ATTACHMENT_MAX_BYTES
            value: {{ .Values.env.optional.ATTACHMENT_MAX_BYTES }}
          - name: AVATAR_MAX_BYTES
            value: {{ .Values.env.optional.AVATAR_MAX_BYTES }}
          - name: PROJECT_BACKGROUND_IMAGE_MAX_BYTES
            value: {{ .Values.env.optional.PROJECT_BACKGROUND_IMAGE_MAX_BYTES }}
          - name: BOARD_IMPORT_MAX_BYTES
            value: {{ .Values.env.optional.BOARD_IMPORT_MAX_BYTES }}
          - name: BOARD_IMPORT_MAX_COMPRESSED_BYTES
            value: {{ .Values.env.optional.BOARD_IMPORT_MAX_COMPRESSED_BYTES }}
          - name: BOARD_IMPORT_MAX_UNCOMPRESSED_BYTES
            value: {{ .Values.env.optional.BOARD_IMPORT_MAX_UNCOMPRESSED_BYTES }}
          - name: BOARD_IMPORT_MAX_ENTRIES
            value: {{ .Values.env.optional.BOARD_IMPORT_MAX_ENTRIES }}
          - name: BOARD_IMPORT_MAX_EXTRACTION_MS
            value: {{ .Values.env.optional.BOARD_IMPORT_MAX_EXTRACTION_MS }}
          - name: SHARP_MAX_INPUT_PIXELS
            value: {{ .Values.env.optional.SHARP_MAX_INPUT_PIXELS }}
          - name: SHARP_CONCURRENCY
            value: {{ .Values.env.optional.SHARP_CONCURRENCY }}
          - name: SHARP_CACHE_MEMORY_MB
            value: {{ .Values.env.optional.SHARP_CACHE_MEMORY_MB }}
          - name: SHARP_CACHE_ITEMS
            value: {{ .Values.env.optional.SHARP_CACHE_ITEMS }}
          - name: SHARP_CACHE_FILES
            value: {{ .Values.env.optional.SHARP_CACHE_FILES }}
          - name: SYSTEM_NOTIFICATIONS_DISABLED
            value: {{ .Values.env.optional.SYSTEM_NOTIFICATIONS_DISABLED }}
          - name: ANDROID_PACKAGE_NAME
            value: {{ .Values.env.optional.ANDROID_PACKAGE_NAME }}
          - name: ANDROID_SHA256_FINGERPRINT
            value: {{ .Values.env.optional.ANDROID_SHA256_FINGERPRINT }}
          - name: DATABASE_URL
            {{- if .Values.postgresql.enabled }}
            value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql.{{ .Release.Namespace }}.svc/{{ .Values.postgresql.auth.database }}"
            {{- end }}
            {{- if not .Values.postgresql.enabled }}
            value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Values.postgresql.postgresUrl }}"
            {{- end }}
          - name: NODE_ENV
            value: production
          volumeMounts:
            - name: user-avatars
              mountPath: /app/public/user-avatars
            - name: project-backgrount-images
              mountPath: /app/public/project-background-images
            - name: attachments
              mountPath: /app/private/attachments
      {{- if eq .Values.service.type "NodePort" }}
      nodeName: {{ .Values.nodeName }}
      {{- end }}
      initContainers:
        - name: db-init
          image: postgres:latest
          command: ['sh', '-c', 'until pg_isready -h $HOST -p $PORT -d $DATABASE; do echo waiting for database; sleep 1; done;']
          env:
            - name: HOST
              value: "{{ .Release.Name }}-postgresql.{{ .Release.Namespace }}.svc"
            - name: PORT
              value: "5432"
            - name: DATABASE
              value: "{{ .Values.postgresql.auth.database }}"
            - name: PGUSER
              value: "{{ .Values.postgresql.auth.username }}"
            - name: PGPASSWORD
              value: "{{ .Values.postgresql.auth.password }}"
      volumes:
        - name: user-avatars
          persistentVolumeClaim:
            claimName: {{ .Values.pv.useravatars.pvcname }}
        - name: project-backgrount-images
          persistentVolumeClaim:
            claimName: {{ .Values.pv.projectbackgroundimages.pvcname }}
        - name: attachments
          persistentVolumeClaim:
            claimName: {{ .Values.pv.attachments.pvcname }}


      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
